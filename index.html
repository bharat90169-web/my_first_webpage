<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Webpage</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 15px;
        }
        h1 {
            margin: 10px 0 5px 0;
            color: #333;
        }
        p {
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="./profile.jpg.jpeg" alt="My Profile Picture" class="profile-img">
        <h1>Bharatbhai Chaudhary</h1>
        <p>Full-Stack Developer & Tech Enthusiast</p>
    </div>

</body>
</html>
